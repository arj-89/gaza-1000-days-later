<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>غزة في 1000 يوم — Gaza in 1,000 Days</title>
<link rel="canonical" href="https://gaza1000.bixet.tech/ar/">
<link rel="alternate" hreflang="ar" href="https://gaza1000.bixet.tech/ar/">
<link rel="alternate" hreflang="en" href="https://gaza1000.bixet.tech/en/">
<link rel="alternate" hreflang="x-default" href="https://gaza1000.bixet.tech/ar/">
<link rel="icon" href="/icon.svg" type="image/svg+xml">
<!-- Language routing: nginx does a server-side Accept-Language 302 at "/".
     This file is the fallback (served at /index.html) — same logic client-side, default Arabic. -->
<script>
  (function () {
    try {
      var langs = navigator.languages || [navigator.language || navigator.userLanguage || 'ar'];
      var prefersEn = langs.length && String(langs[0]).toLowerCase().indexOf('en') === 0;
      location.replace(prefersEn ? '/en/' : '/ar/');
    } catch (e) {
      location.replace('/ar/');
    }
  })();
</script>
<noscript><meta http-equiv="refresh" content="0; url=/ar/"></noscript>
</head>
<body>
<p style="font-family:system-ui,-apple-system,sans-serif;text-align:center;margin-top:3rem">
  <a href="/ar/">العربية</a> &middot; <a href="/en/">English</a>
</p>
</body>
</html>
