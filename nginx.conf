server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve .geojson with a correct type (data files under /data)
    location ~* \.geojson$ {
        default_type application/geo+json;
    }

    # Long-cache the bundled static assets (fonts, favicon, flag)
    location ~* \.(?:woff2|svg|png|ico)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
