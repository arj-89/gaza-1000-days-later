# Language routing at the root, based on the browser's Accept-Language header.
# Anything not clearly English falls back to Arabic (the default).
map $http_accept_language $gaza_root_lang {
    default   /ar/;
    ~*^en     /en/;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Emit relative redirects so the root 302 keeps the original https scheme
    # (nginx sits behind Traefik and only sees http internally).
    absolute_redirect off;

    # Root: server-side Accept-Language redirect (fallback /ar/).
    location = / {
        return 302 $gaza_root_lang;
    }

    # Data files under /data get a correct type.
    location ~* \.geojson$ {
        default_type application/geo+json;
    }

    # Long-cache the static assets (fonts, favicon, flag, og-image).
    location ~* \.(?:woff2|svg|png|ico|jpg|jpeg)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    # /ar/ and /en/ (and everything else) served as static files.
    location / {
        try_files $uri $uri/ =404;
    }
}
